<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Search')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">

    <!-- Search form -->
    <div class="filter-bar mb-4">
        <form th:action="@{/search}" method="get" class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label small text-secondary">Search term / ID</label>
                <input class="form-control" type="search" name="q" th:value="${q}" placeholder="e.g. Inception"/>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-secondary">Search field</label>
                <select class="form-select" name="field">
                    <option value="name"          th:selected="${field == 'name'}">Name</option>
                    <option value="imdb_id"       th:selected="${field == 'imdb_id'}">IMDb ID</option>
                    <option value="tmdb_movie_id" th:selected="${field == 'tmdb_movie_id'}">TMDB Movie ID</option>
                    <option value="tmdb_tv_id"    th:selected="${field == 'tmdb_tv_id'}">TMDB TV ID</option>
                    <option value="tmdb_person_id" th:selected="${field == 'tmdb_person_id'}">TMDB Person ID</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-secondary">Type filter</label>
                <select class="form-select" name="types">
                    <option value="">All</option>
                    <option value="movie"       th:selected="${types == 'movie'}">Movies</option>
                    <option value="tv_series"   th:selected="${types == 'tv_series'}">TV Series</option>
                    <option value="person"      th:selected="${types == 'person'}">People</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-danger w-100" type="submit">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </div>
        </form>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- No query -->
    <div th:if="${q == null or q.isBlank()}" class="text-center text-secondary py-5">
        <i class="bi bi-search" style="font-size:3rem;"></i>
        <p class="mt-3">Enter a search term above to find titles or people.</p>
    </div>

    <!-- Results -->
    <div th:if="${results != null}">

        <!-- Title results -->
        <div th:if="${results.titleResults != null and !results.titleResults.isEmpty()}">
            <span class="section-title">
                Titles
                <span class="text-secondary fw-normal fs-6 ms-2"
                      th:text="'(' + ${results.titleResults.size()} + ')'"></span>
            </span>
            <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-3 mt-1">
                <div class="col" th:each="t : ${results.titleResults}">
                    <a th:href="@{/titles/{id}(id=${t.id})}" class="poster-card">
                        <img th:if="${posterMap != null and posterMap[t.id] != null and !posterMap[t.id].isEmpty()}"
                             th:src="${posterMap[t.id]}" th:alt="${t.name}" loading="lazy"/>
                        <div th:unless="${posterMap != null and posterMap[t.id] != null and !posterMap[t.id].isEmpty()}"
                             class="placeholder-poster">
                            <i class="bi bi-film ph-icon"></i>
                            <span class="ph-title" th:text="${t.name}"></span>
                            <span class="ph-year" th:text="${t.year}"></span>
                        </div>
                        <div class="card-body">
                            <div class="card-title" th:text="${t.name}">Title</div>
                            <div class="card-meta">
                                <span th:text="${t.year}"></span>
                                <span class="ms-1 text-capitalize" th:text="${t.type?.replace('_',' ')}"></span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- People results -->
        <div th:if="${results.peopleResults != null and !results.peopleResults.isEmpty()}" class="mt-5">
            <span class="section-title">
                People
                <span class="text-secondary fw-normal fs-6 ms-2"
                      th:text="'(' + ${results.peopleResults.size()} + ')'"></span>
            </span>
            <div class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-3 mt-1">
                <div class="col" th:each="p : ${results.peopleResults}">
                    <a th:href="@{/people/{id}(id=${p.id})}" class="poster-card text-center">
                        <div class="placeholder-poster" style="aspect-ratio:1/1;">
                            <i class="bi bi-person ph-icon"></i>
                            <span class="ph-title" th:text="${p.name}"></span>
                        </div>
                        <div class="card-body">
                            <div class="card-title" th:text="${p.name}">Name</div>
                            <div class="card-meta">Person</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- No results -->
        <div th:if="${(results.titleResults == null or results.titleResults.isEmpty())
                   and (results.peopleResults == null or results.peopleResults.isEmpty())}"
             class="text-center text-secondary py-5">
            <i class="bi bi-emoji-frown" style="font-size:3rem;"></i>
            <p class="mt-3">No results found for "<strong th:text="${q}"></strong>".</p>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
