<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(${person?.fullName ?: 'Person'})}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${person != null}" class="row g-4">
        <!-- Headshot -->
        <div class="col-auto">
            <img th:if="${person.headshotUrl}" th:src="${person.headshotUrl}" th:alt="${person.fullName}"
                 class="rounded-circle shadow" style="width:160px;height:160px;object-fit:cover;"/>
            <div th:unless="${person.headshotUrl}"
                 class="rounded-circle shadow d-flex align-items-center justify-content-center"
                 style="width:160px;height:160px;background:#2a2a2a;font-size:4rem;color:#444;">
                <i class="bi bi-person"></i>
            </div>
        </div>

        <!-- Info -->
        <div class="col">
            <h1 class="fw-bold mb-2" th:text="${person.fullName}">Name</h1>

            <div class="d-flex flex-wrap gap-2 mb-3">
                <span th:if="${person.mainProfession}"
                      class="badge bg-secondary text-capitalize" th:text="${person.mainProfession}"></span>
                <span th:if="${person.secondaryProfession}"
                      class="badge bg-secondary text-capitalize" th:text="${person.secondaryProfession}"></span>
                <span th:if="${person.tertiaryProfession}"
                      class="badge bg-secondary text-capitalize" th:text="${person.tertiaryProfession}"></span>
            </div>

            <dl class="row small mb-0">
                <dt class="col-sm-3 text-secondary" th:if="${person.dateOfBirth}">Born</dt>
                <dd class="col-sm-9" th:if="${person.dateOfBirth}" th:text="${person.dateOfBirth}"></dd>

                <dt class="col-sm-3 text-secondary" th:if="${person.dateOfDeath}">Died</dt>
                <dd class="col-sm-9" th:if="${person.dateOfDeath}" th:text="${person.dateOfDeath}"></dd>

                <dt class="col-sm-3 text-secondary" th:if="${person.placeOfBirth}">Birthplace</dt>
                <dd class="col-sm-9" th:if="${person.placeOfBirth}" th:text="${person.placeOfBirth}"></dd>

                <dt class="col-sm-3 text-secondary" th:if="${person.gender}">Gender</dt>
                <dd class="col-sm-9" th:if="${person.gender == 'm'}">Male</dd>
                <dd class="col-sm-9" th:if="${person.gender == 'f'}">Female</dd>

                <dt class="col-sm-3 text-secondary" th:if="${person.imdbId}">IMDb</dt>
                <dd class="col-sm-9" th:if="${person.imdbId}">
                    <a th:href="'https://www.imdb.com/name/' + ${person.imdbId}"
                       target="_blank" class="text-danger" th:text="${person.imdbId}"></a>
                </dd>
            </dl>
        </div>
    </div>

    <!-- Known for -->
    <div th:if="${knownForTitles != null and !knownForTitles.isEmpty()}" class="mt-5">
        <span class="section-title">Known For</span>
        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-5 row-cols-lg-6 g-3 mt-1">
            <div class="col" th:each="t : ${knownForTitles}">
                <a th:href="@{/titles/{id}(id=${t.id})}" class="poster-card">
                    <img th:if="${t.poster}" th:src="${t.poster}" th:alt="${t.title}" loading="lazy"/>
                    <div th:unless="${t.poster}" class="placeholder-poster">
                        <i class="bi bi-film ph-icon"></i>
                        <span class="ph-title" th:text="${t.title}"></span>
                    </div>
                    <div class="card-body">
                        <div class="card-title" th:text="${t.title}">Title</div>
                        <div class="card-meta d-flex justify-content-between align-items-center">
                            <span th:text="${t.year}"></span>
                            <span th:if="${t.userRating != null}" class="imdb-mini-badge"
                                  th:text="${#numbers.formatDecimal(t.userRating, 1, 1)}"></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
