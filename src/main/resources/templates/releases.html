<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('New Releases')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">

    <h2 class="fw-bold mb-3">New &amp; Upcoming Releases</h2>

    <!-- Date filter -->
    <form id="dateFilterForm" th:action="@{/releases}" method="get" class="filter-bar mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label small text-secondary">From</label>
                <input class="form-control form-control-sm" type="date" id="startDatePicker"
                       th:data-value="${startDate}"/>
                <input type="hidden" name="startDate" id="startDateHidden" th:value="${startDate}"/>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-secondary">To</label>
                <input class="form-control form-control-sm" type="date" id="endDatePicker"
                       th:data-value="${endDate}"/>
                <input type="hidden" name="endDate" id="endDateHidden" th:value="${endDate}"/>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-secondary">Source</label>
                <select class="form-select form-select-sm" name="sourceId">
                    <option value="">All sources</option>
                    <option th:each="s : ${sources}"
                            th:value="${s.id}"
                            th:text="${s.name}"
                            th:selected="${s.id == selectedSourceId}"></option>
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-danger btn-sm" type="submit">Apply</button>
                <a th:href="@{/releases}" class="btn btn-outline-secondary btn-sm ms-2">Reset</a>
            </div>
        </div>
    </form>
    <script>
        (function () {
            function toISO(yyyymmdd) {
                if (!yyyymmdd || yyyymmdd.length < 8) return '';
                return yyyymmdd.slice(0, 4) + '-' + yyyymmdd.slice(4, 6) + '-' + yyyymmdd.slice(6, 8);
            }
            function fromISO(isoDate) {
                return isoDate ? isoDate.replace(/-/g, '') : '';
            }
            var startPicker = document.getElementById('startDatePicker');
            var endPicker = document.getElementById('endDatePicker');
            startPicker.value = toISO(startPicker.dataset.value);
            endPicker.value = toISO(endPicker.dataset.value);
            document.getElementById('dateFilterForm').addEventListener('submit', function () {
                document.getElementById('startDateHidden').value = fromISO(startPicker.value);
                document.getElementById('endDateHidden').value = fromISO(endPicker.value);
            });
        })();
    </script>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${releases != null and releases.releases != null}">
        <p th:unless="${releases.releases.isEmpty()}" class="text-secondary small mb-3"
           th:text="${#lists.size(releases.releases)} + ' results'"></p>
        <div th:if="${releases.releases.isEmpty()}" class="text-center text-secondary py-5">
            <i class="bi bi-calendar-x" style="font-size:3rem;"></i>
            <p class="mt-3">No releases found for the selected date range.</p>
        </div>

        <div th:each="r : ${releases.releases}" class="release-item">
            <a th:href="@{/titles/{id}(id=${r.id})}" class="text-decoration-none flex-shrink-0">
                <img th:if="${r.posterUrl}" th:src="${r.posterUrl}" th:alt="${r.title}" loading="lazy"/>
                <div th:unless="${r.posterUrl}"
                     style="width:60px;height:90px;background:#2a2a2a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#666;">
                    <i class="bi bi-film"></i>
                </div>
            </a>
            <div class="flex-grow-1 min-w-0">
                <a th:href="@{/titles/{id}(id=${r.id})}"
                   class="fw-semibold text-decoration-none text-light d-block text-truncate"
                   th:text="${r.title}">Title</a>
                <div class="small text-secondary mt-1">
                    <span class="text-capitalize"
                          th:text="${r.type?.replace('_',' ')}"></span>
                    <span th:if="${r.seasonNumber}" class="ms-2">Season <span th:text="${r.seasonNumber}"></span></span>
                </div>
                <div class="mt-1 d-flex align-items-center flex-wrap gap-2">
                    <span class="source-badge type-sub" th:if="${r.sourceName}">
                        <i class="bi bi-play-circle me-1"></i>
                        <span th:text="${r.sourceName}"></span>
                        <span th:if="${r.isOriginal}" class="ms-1 badge bg-danger" style="font-size:.65rem;">ORIGINAL</span>
                    </span>
                    <span class="small text-secondary" th:if="${r.sourceReleaseDate}">
                        <i class="bi bi-calendar3 me-1"></i><span th:text="${r.sourceReleaseDate}"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
