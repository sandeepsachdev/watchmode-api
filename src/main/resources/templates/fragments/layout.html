<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Watchmode'">Watchmode</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-play-circle-fill text-danger me-2"></i>Watchmode
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/browse}"><i class="bi bi-grid me-1"></i>Browse</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/releases}"><i class="bi bi-calendar3 me-1"></i>Releases</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/swagger-ui.html" target="_blank">
                        <i class="bi bi-braces me-1"></i>API Docs
                    </a>
                </li>
            </ul>
            <form class="d-flex" th:action="@{/search}" method="get">
                <div class="input-group">
                    <input class="form-control form-control-sm" type="search" name="q"
                           placeholder="Search titles…" aria-label="Search"/>
                    <button class="btn btn-danger btn-sm" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-dark text-secondary py-4 mt-auto">
    <div class="container text-center small">
        <span>Powered by <a href="https://api.watchmode.com" target="_blank" class="text-danger text-decoration-none">Watchmode API</a></span>
    </div>
</footer>
</html>
